receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"

exporters:
  azuremonitor:
    connection_string: "${APPLICATION_INSIGHTS_CONNECTION_STRING}"

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: []
      exporters: [azuremonitor]
    logs:
      receivers: [otlp]
      processors: []
      exporters: [azuremonitor]
