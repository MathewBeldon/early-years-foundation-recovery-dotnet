# Podman Compose file (also works with `docker compose`)
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: eyrecovery
      POSTGRES_PASSWORD: eyrecovery
      POSTGRES_DB: ey_recovery_dotnet
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  gov-one-login-simulator:
    image: ghcr.io/govuk-one-login/simulator:latest
    environment:
      SIMULATOR_URL: http://localhost:3333
      CLIENT_ID: HGIOgho9HIRhgoepdIOPFdIUWgewi0jw
      REDIRECT_URLS: http://localhost:5000/users/auth/openid_connect/callback
      POST_LOGOUT_REDIRECT_URLS: http://localhost:5000/users/sign_out
    ports:
      - "3333:3000"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC from the ASP.NET Core app
      - "4318:4318" # OTLP HTTP, useful for future tools
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.57
    command: ["--query.ui-config=/etc/jaeger/jaeger-ui.json"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
    volumes:
      - ./jaeger-ui.json:/etc/jaeger/jaeger-ui.json:ro
    ports:
      - "16686:16686" # Jaeger UI

volumes:
  postgres_data:
