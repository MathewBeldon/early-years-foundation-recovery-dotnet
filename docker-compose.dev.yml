---
services:
  app:
    container_name: recovery_dev
    build:
      target: dev
    image: recovery:dev
    # Do not let Foreman reload the host .env over Compose-injected values
    # (a local DATABASE_URL=localhost would otherwise break in-container boot).
    command: ["foreman", "start", "-f", "Procfile.dev", "-e", "/dev/null"]
    healthcheck:
      test: curl --fail http://localhost:3000/health || exit 1
    restart: on-failure
    ports:
      - 3000:3000
    environment:
      # General dev env
      # Keep ENVIRONMENT set so boot does not fall through to encrypted credentials.
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - MAINTENANCE=false
      - PGUSER=postgres
      - PGPASSWORD=password
      - PGHOST=db
      - PGDATABASE=early_years_foundation_recovery_development
      - DATABASE_URL=postgres://postgres:password@db:5432/early_years_foundation_recovery_development
      - RAILS_ENV=development
      - DOMAIN=localhost:3000
      - RAILS_SERVE_STATIC_FILES=true
      # Injected from the host .env at compose time (application.rb reads ENV before dotenv-rails).
      - GOVUK_NOTIFY_API_KEY=${GOVUK_NOTIFY_API_KEY:-dev-notify-not-configured}
      # Ignore a malformed host RAILS_MASTER_KEY (dotenv will not override this empty value).
      # Migration/dev Compose must not decrypt production credentials.yml.enc.
      - RAILS_MASTER_KEY=
      - MIGRATION_SKIP_CREDENTIALS=true
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-migration-dev-secret-key-base-not-for-production}
      # Host .env often leaves TIMEOUT_IN_MINUTES blank; ''.to_i => 0 instant Devise timeouts.
      - TIMEOUT_IN_MINUTES=${TIMEOUT_IN_MINUTES:-1440}
      - UNLOCK_IN_MINUTES=${UNLOCK_IN_MINUTES:-120}

      # OpenTelemetry config pointing to collector in docker-compose
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=early-years-foundation-recovery
      - APPLICATION_INSIGHTS_CONNECTION_STRING=${APPLICATION_INSIGHTS_CONNECTION_STRING}

      # GOV.UK One Login (points at local simulator by default in dev).
      - GOV_ONE_BASE_URI=${GOV_ONE_BASE_URI:-http://localhost:4000}
      - GOV_ONE_CLIENT_ID=${GOV_ONE_CLIENT_ID:-cdt-local-dev}
      - GOV_ONE_PRIVATE_KEY_PATH=${GOV_ONE_PRIVATE_KEY_PATH:-/srv/config/gov_one/dev_private_key.pem}

      # Non-production Contentful test environment (optional for health-only work).
      # Prefer CONTENTFUL_TEST_*; fall back to ordinary non-production CONTENTFUL_* from .env.
      - CONTENTFUL_SPACE=${CONTENTFUL_TEST_SPACE:-${CONTENTFUL_SPACE:-}}
      - CONTENTFUL_DELIVERY_TOKEN=${CONTENTFUL_TEST_DELIVERY_TOKEN:-${CONTENTFUL_DELIVERY_TOKEN:-}}
      - CONTENTFUL_PREVIEW_TOKEN=${CONTENTFUL_TEST_PREVIEW_TOKEN:-${CONTENTFUL_PREVIEW_TOKEN:-}}
      - CONTENTFUL_MANAGEMENT_TOKEN=${CONTENTFUL_TEST_MANAGEMENT_TOKEN:-${CONTENTFUL_MANAGEMENT_TOKEN:-}}
      - CONTENTFUL_ENVIRONMENT=${CONTENTFUL_TEST_ENVIRONMENT:-${CONTENTFUL_ENVIRONMENT:-test}}

    depends_on:
      gov-one-simulator:
        condition: service_healthy
    volumes:
      - .:/srv
    tty: true
    stdin_open: true
    networks:
      - recovery

  gov-one-simulator:
    container_name: recovery_gov_one_simulator
    image: ghcr.io/govuk-one-login/simulator@sha256:3d9bd12ecd6a49cb1b1618845813e9853003f54294812cdb5736ea460ba4fe8b
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      SIMULATOR_URL: http://localhost:4000
      CLIENT_ID: ${GOV_ONE_CLIENT_ID:-cdt-local-dev}
      REDIRECT_URLS: http://localhost:3000/users/auth/openid_connect/callback
      POST_LOGOUT_REDIRECT_URLS: http://localhost:3000/users/sign_out
      SCOPES: openid,email
      ID_TOKEN_SIGNING_ALGORITHM: ES256
      PUBLIC_KEY: |-
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAmXXR3EsRvUMVhEJMtQ1w
        exJjfQ00Q0MQ7ARfShN53BnOQEPFnS/I8ntBddkKdE3q+vMTI72w6Fv3SsMM+ciR
        2LIHdEQfKgsLt6PGNcV1kG6GG/3nSW3psW8w65Q3fmy81P1748qezDrVfaGrF4PD
        XALzX1ph+nz8mpKmck6aY6LEUJ4B+TIfYzlKmmwFe3ri0spSW+J5wE9mmT3VkR2y
        SuHRYHQlxlF9dfX7ltOTsbgJFzN6TO01ZQDhY0iLwzdGwhSxO6R6N/ZINYHCKFPa
        QD+tdKsrw7QDIYnx0IiXFnkGnizl3UtqSmXAaceTvPM2Pz84x2JiwHrp2Sml6RYL
        CQIDAQAB
        -----END PUBLIC KEY-----
    networks:
      - recovery
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/.well-known/openid-configuration || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    container_name: recovery_worker
    image: recovery:dev
    command: que
    environment:
      - RAILS_ENV=development
      - DATABASE_URL=postgres://postgres:password@db:5432/early_years_foundation_recovery_development
      - DASHBOARD_UPDATE=false
      - SENTRY_TOKEN
      - DASHBOARD_UPDATE_INTERVAL
      - GOOGLE_CLOUD_BUCKET
      - CONTENTFUL_SPACE=${CONTENTFUL_TEST_SPACE:-}
      - CONTENTFUL_DELIVERY_TOKEN=${CONTENTFUL_TEST_DELIVERY_TOKEN:-}
      - CONTENTFUL_PREVIEW_TOKEN=${CONTENTFUL_TEST_PREVIEW_TOKEN:-}
      - CONTENTFUL_ENVIRONMENT=${CONTENTFUL_TEST_ENVIRONMENT:-test}

      # OpenTelemetry config pointing to collector
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=early-years-foundation-recovery
      - APPLICATION_INSIGHTS_CONNECTION_STRING=${APPLICATION_INSIGHTS_CONNECTION_STRING}

    depends_on:
      - db
    volumes:
      - .:/srv
    tty: true
    stdin_open: true
    networks:
      - recovery

  doc:
    container_name: recovery_doc
    image: recovery:dev
    command: yard server
    healthcheck:
      test: curl --fail http://localhost:8808 || exit 1
    volumes:
      - .:/srv
    ports:
      - 8808:8808
    networks:
      - recovery

  pa11y:
    container_name: recovery_pa11y
    build:
      context: .
      target: pa11y
    image: recovery:pa11y
    environment:
      - DOMAIN=localhost:3000
      - BOT_TOKEN
    depends_on:
      app:
        condition: service_healthy
    networks:
      - recovery
    volumes:
      - ./tmp/pa11y:/tmp/pa11y
    tty: true
    stdin_open: true


networks:
  recovery:
